<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Yedek parça tedarik, stok ve iş takibi için basit tek dosyalık kayıt paneli.">
<title>Atölye Defteri</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef1ef;
    --bg-panel:#ffffff;
    --bg-card:#ffffff;
    --bg-card-2:#f4f6f5;
    --line:#d7dcda;
    --line-soft:#e4e8e6;
    --text:#22262a;
    --text-dim:#5c6266;
    --text-faint:#8b9195;
    --accent:#bd7a24;
    --accent-soft:#bd7a2420;
    --accent-2:#3a6f6f;
    --accent-2-soft:#3a6f6f1e;
    --danger:#a8402e;
    --danger-soft:#a8402e16;
    --success:#5c7a3f;
    --success-soft:#5c7a3f18;
    --waiting:#a07610;
    --waiting-soft:#a076101c;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      repeating-linear-gradient(0deg, var(--line-soft) 0px, var(--line-soft) 1px, transparent 1px, transparent 28px),
      repeating-linear-gradient(90deg, var(--line-soft) 0px, var(--line-soft) 1px, transparent 1px, transparent 28px),
      var(--bg);
    background-size: 28px 28px, 28px 28px, auto;
    color:var(--text);
    font-family:'IBM Plex Mono', monospace;
    min-height:100vh;
    padding:18px;
  }
  .wrap{max-width:960px;margin:0 auto;}

  /* HEADER */
  header{
    display:flex;align-items:flex-end;justify-content:space-between;
    gap:12px;flex-wrap:wrap;
    border-bottom:3px double var(--line);
    padding-bottom:14px;margin-bottom:18px;
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-mark{
    width:46px;height:46px;border:2px solid var(--accent);border-radius:6px;
    display:flex;align-items:center;justify-content:center;
    font-family:'Oswald',sans-serif;font-weight:700;color:var(--accent);
    font-size:20px;transform:rotate(-4deg);flex-shrink:0;background:var(--bg-panel);
  }
  h1{
    font-family:'Oswald',sans-serif;font-weight:700;text-transform:uppercase;
    letter-spacing:1.5px;font-size:22px;margin:0;color:var(--text);
  }
  .subtitle{color:var(--text-dim);font-size:12.5px;margin-top:3px;letter-spacing:.3px;}
  .date-badge{
    font-size:11.5px;color:var(--text-faint);border:1px solid var(--line);
    padding:5px 10px;border-radius:4px;white-space:nowrap;background:var(--bg-panel);
  }

  /* TABS */
  .tabs{
    display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;
  }
  .tab-btn{
    font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.6px;
    text-transform:uppercase;font-size:12.5px;
    background:var(--bg-panel);color:var(--text-dim);
    border:1px solid var(--line);border-radius:5px;
    padding:9px 16px;cursor:pointer;transition:.15s;
  }
  .tab-btn:hover{border-color:var(--accent);color:var(--text);}
  .tab-btn.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}

  .panel{display:none;}
  .panel.active{display:block;animation:fadein .18s ease;}
  @keyframes fadein{from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:translateY(0);}}

  /* DASHBOARD CARDS */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px;}
  .stat-card{
    background:var(--bg-card);border:1px solid var(--line);border-radius:6px;
    padding:14px;position:relative;overflow:hidden;
    box-shadow:0 1px 2px rgba(30,35,32,.04);
  }
  .stat-card::before{
    content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--accent);
  }
  .stat-card.warn::before{background:var(--danger);}
  .stat-label{font-size:10.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.8px;}
  .stat-value{font-family:'Oswald',sans-serif;font-size:26px;font-weight:700;margin-top:4px;color:var(--text);}
  .stat-value.money::before{content:'₺';font-size:16px;color:var(--text-dim);margin-right:2px;}
  .stat-value.warn{color:var(--danger);}

  .section-title{
    font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;
    letter-spacing:.8px;font-size:14px;color:var(--text-dim);margin:22px 0 10px;
    display:flex;align-items:center;gap:8px;
  }
  .section-title::after{content:'';flex:1;height:1px;background:var(--line);}

  /* FORMS */
  .form-card{
    background:var(--bg-panel);border:1px solid var(--line);border-radius:8px;
    padding:16px;margin-bottom:20px;
    box-shadow:0 1px 3px rgba(30,35,32,.05);
  }
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;}
  .field label{display:block;font-size:10.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;}
  .field input, .field select, .field textarea{
    width:100%;background:var(--bg-card-2);border:1px solid var(--line);border-radius:5px;
    color:var(--text);padding:9px 10px;font-family:'IBM Plex Mono',monospace;font-size:13px;
  }
  .field input:focus, .field select:focus, .field textarea:focus{outline:none;border-color:var(--accent);}
  .field textarea{resize:vertical;min-height:44px;}
  .form-actions{display:flex;gap:8px;margin-top:14px;}

  button.btn{
    font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.5px;text-transform:uppercase;
    font-size:12px;padding:9px 18px;border-radius:5px;border:1px solid var(--accent);
    background:var(--accent);color:#fff;cursor:pointer;transition:.15s;
  }
  button.btn:hover{filter:brightness(1.08);}
  button.btn.secondary{background:transparent;color:var(--text-dim);border-color:var(--line);}
  button.btn.secondary:hover{color:var(--text);border-color:var(--text-dim);}
  button.btn.danger{background:transparent;color:var(--danger);border-color:var(--danger);}
  button.btn.danger:hover{background:var(--danger-soft);}
  button.btn.small{padding:5px 11px;font-size:10.5px;}
  button.btn:disabled{opacity:.5;cursor:not-allowed;}

  /* LIST ROWS */
  .list{display:flex;flex-direction:column;gap:8px;}
  .row-card{
    background:var(--bg-card);border:1px solid var(--line);border-radius:6px;
    padding:12px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
    box-shadow:0 1px 2px rgba(30,35,32,.03);
  }
  .row-card.low-stock{border-color:var(--danger);background:var(--danger-soft);}
  .row-main{flex:1;min-width:200px;}
  .row-title{font-weight:600;color:var(--text);font-size:14px;}
  .row-sub{font-size:11.5px;color:var(--text-dim);margin-top:3px;line-height:1.5;}
  .row-sub span{color:var(--text-faint);}
  .row-actions{display:flex;gap:6px;}
  .tag{
    display:inline-block;font-size:10px;padding:2px 7px;border-radius:3px;
    background:var(--accent-2-soft);color:var(--accent-2);letter-spacing:.4px;text-transform:uppercase;
  }
  .tag.danger{background:var(--danger-soft);color:var(--danger);}

  /* JOB TICKETS */
  .ticket{
    background:var(--bg-card);border:1px solid var(--line);border-radius:6px;
    padding:14px 16px 14px 20px;margin-bottom:10px;position:relative;
    border-left:3px dashed var(--line);
    box-shadow:0 1px 2px rgba(30,35,32,.04);
  }
  .ticket::before{
    content:'';position:absolute;left:-4px;top:0;bottom:0;width:7px;
    background-image:radial-gradient(circle, var(--bg) 2.2px, transparent 2.2px);
    background-size:7px 14px;background-position:0 0;
  }
  .ticket-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;}
  .ticket-veh{font-weight:600;color:var(--text);font-size:14.5px;}
  .ticket-date{font-size:11px;color:var(--text-faint);margin-top:2px;}
  .stamp{
    font-family:'Oswald',sans-serif;font-weight:700;font-size:10.5px;letter-spacing:1px;
    text-transform:uppercase;border:2px double currentColor;border-radius:4px;
    padding:3px 9px;transform:rotate(-5deg);white-space:nowrap;
  }
  .stamp.waiting{color:var(--waiting);}
  .stamp.done{color:var(--success);}
  .ticket-detail{margin-top:10px;font-size:12.5px;color:var(--text-dim);line-height:1.7;}
  .ticket-detail b{color:var(--text);font-weight:600;}
  .ticket-money{display:flex;gap:18px;margin-top:10px;flex-wrap:wrap;}
  .money-block{font-size:11px;color:var(--text-faint);}
  .money-block .v{display:block;font-family:'Oswald',sans-serif;font-size:16px;color:var(--text);margin-top:2px;}
  .money-block.profit .v{color:var(--success);}
  .ticket-actions{display:flex;gap:6px;margin-top:12px;}

  .empty{
    text-align:center;color:var(--text-faint);font-size:12.5px;padding:30px 10px;
    border:1px dashed var(--line);border-radius:8px;background:var(--bg-panel);
  }

  footer{margin-top:34px;padding-top:14px;border-top:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
  .save-status{font-size:11px;color:var(--text-faint);}
  .save-status.ok{color:var(--success);}
  .save-status.err{color:var(--danger);}

  select option{background:var(--bg-card-2);}

  @media (max-width:520px){
    h1{font-size:18px;}
    .stat-value{font-size:21px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="brand-mark">AD</div>
      <div>
        <h1>Atölye Defteri</h1>
        <div class="subtitle">Parça tedarik, stok &amp; iş kayıt paneli</div>
      </div>
    </div>
    <div class="date-badge" id="todayBadge"></div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" data-tab="dash">Panel</button>
    <button class="tab-btn" data-tab="jobs">İşler</button>
    <button class="tab-btn" data-tab="stock">Parça Stok</button>
    <button class="tab-btn" data-tab="suppliers">Tedarikçiler</button>
    <button class="tab-btn" data-tab="mechanics">Tamirciler</button>
  </div>

  <!-- DASHBOARD -->
  <section class="panel active" id="panel-dash">
    <div class="stat-grid" id="statGrid"></div>
    <div class="section-title">Son İşler</div>
    <div class="list" id="recentJobs"></div>
  </section>

  <!-- JOBS -->
  <section class="panel" id="panel-jobs">
    <div class="section-title">Yeni İş Kaydı</div>
    <div class="form-card">
      <div class="form-grid">
        <div class="field">
          <label>Tarih</label>
          <input type="date" id="jobDate">
        </div>
        <div class="field">
          <label>Tamirci</label>
          <select id="jobMechanic"><option value="">— Seç —</option></select>
        </div>
        <div class="field">
          <label>Araç / Motor</label>
          <input type="text" id="jobVehicle" placeholder="Örn: Opel Astra 1.6 dizel">
        </div>
        <div class="field">
          <label>Aranan Parça(lar)</label>
          <input type="text" id="jobParts" placeholder="Örn: Turbo, enjektör seti">
        </div>
        <div class="field">
          <label>Tedarikçi</label>
          <select id="jobSupplier"><option value="">— Seç —</option></select>
        </div>
        <div class="field">
          <label>Durum</label>
          <select id="jobStatus">
            <option value="waiting">Beklemede</option>
            <option value="done">Teslim Edildi</option>
          </select>
        </div>
        <div class="field">
          <label>Parça Maliyeti (₺)</label>
          <input type="number" id="jobCost" placeholder="0" min="0" step="0.01">
        </div>
        <div class="field">
          <label>Satış Fiyatı (₺)</label>
          <input type="number" id="jobPrice" placeholder="0" min="0" step="0.01">
        </div>
        <div class="field" style="grid-column:1/-1;">
          <label>Not</label>
          <textarea id="jobNote" placeholder="Ek bilgi..."></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn" id="jobSubmitBtn">Kaydı Ekle</button>
        <button class="btn secondary" id="jobCancelBtn" style="display:none;">Vazgeç</button>
      </div>
    </div>

    <div class="section-title">Tüm İşler</div>
    <div class="list" id="jobList"></div>
  </section>

  <!-- STOCK -->
  <section class="panel" id="panel-stock">
    <div class="section-title">Yeni Stok Kalemi</div>
    <div class="form-card">
      <div class="form-grid">
        <div class="field"><label>Parça Adı</label><input type="text" id="stkName" placeholder="Örn: Yağ filtresi"></div>
        <div class="field"><label>Parça Numarası</label><input type="text" id="stkPartNo" placeholder="Örn: 93186554"></div>
        <div class="field"><label>Stok Adedi</label><input type="number" id="stkQty" placeholder="0" min="0" step="1"></div>
        <div class="field"><label>Min. Uyarı Seviyesi</label><input type="number" id="stkMinQty" placeholder="Örn: 2" min="0" step="1"></div>
        <div class="field"><label>Alış Fiyatı (₺)</label><input type="number" id="stkBuyPrice" placeholder="0" min="0" step="0.01"></div>
        <div class="field"><label>Satış Fiyatı (₺)</label><input type="number" id="stkSellPrice" placeholder="0" min="0" step="0.01"></div>
        <div class="field">
          <label>Tedarikçi</label>
          <select id="stkSupplier"><option value="">— Seç —</option></select>
        </div>
        <div class="field" style="grid-column:1/-1;"><label>Not</label><textarea id="stkNote" placeholder="Raf yeri, uyumlu modeller..."></textarea></div>
      </div>
      <div class="form-actions">
        <button class="btn" id="stkSubmitBtn">Stok Ekle</button>
        <button class="btn secondary" id="stkCancelBtn" style="display:none;">Vazgeç</button>
      </div>
    </div>
    <div class="section-title">Stok Listesi</div>
    <div class="list" id="stockList"></div>
  </section>

  <!-- SUPPLIERS -->
  <section class="panel" id="panel-suppliers">
    <div class="section-title">Yeni Tedarikçi</div>
    <div class="form-card">
      <div class="form-grid">
        <div class="field"><label>Ad</label><input type="text" id="supName" placeholder="Örn: Ahmet Usta Hurdacı"></div>
        <div class="field"><label>Telefon</label><input type="text" id="supPhone" placeholder="05xx xxx xx xx"></div>
        <div class="field"><label>Uzmanlık / Parça Tipi</label><input type="text" id="supSpec" placeholder="Örn: Motor bloğu, turbo"></div>
        <div class="field"><label>Ort. Teslim Süresi</label><input type="text" id="supTime" placeholder="Örn: 1 gün"></div>
        <div class="field" style="grid-column:1/-1;"><label>Not</label><textarea id="supNote" placeholder="Fiyat aralığı, güvenilirlik notu..."></textarea></div>
      </div>
      <div class="form-actions">
        <button class="btn" id="supSubmitBtn">Tedarikçi Ekle</button>
        <button class="btn secondary" id="supCancelBtn" style="display:none;">Vazgeç</button>
      </div>
    </div>
    <div class="section-title">Tedarikçi Listesi</div>
    <div class="list" id="supplierList"></div>
  </section>

  <!-- MECHANICS -->
  <section class="panel" id="panel-mechanics">
    <div class="section-title">Yeni Tamirci</div>
    <div class="form-card">
      <div class="form-grid">
        <div class="field"><label>Ad</label><input type="text" id="mecName" placeholder="Örn: Mehmet Usta"></div>
        <div class="field"><label>İşletme / Dükkan</label><input type="text" id="mecShop" placeholder="Örn: Yıldız Oto Servis"></div>
        <div class="field"><label>Telefon</label><input type="text" id="mecPhone" placeholder="05xx xxx xx xx"></div>
        <div class="field" style="grid-column:1/-1;"><label>Not</label><textarea id="mecNote" placeholder="Çalıştığı marka/model, ödeme alışkanlığı..."></textarea></div>
      </div>
      <div class="form-actions">
        <button class="btn" id="mecSubmitBtn">Tamirci Ekle</button>
        <button class="btn secondary" id="mecCancelBtn" style="display:none;">Vazgeç</button>
      </div>
    </div>
    <div class="section-title">Tamirci Listesi</div>
    <div class="list" id="mechanicList"></div>
  </section>

  <footer>
    <span class="save-status" id="saveStatus">Yükleniyor...</span>
    <button class="btn danger small" id="resetBtn">Tüm Verileri Sıfırla</button>
  </footer>

</div>

<script>
(function(){
  let suppliers = [];
  let mechanics = [];
  let jobs = [];
  let stock = [];
  let editingJobId = null;
  let editingSupId = null;
  let editingMecId = null;
  let editingStkId = null;

  const $ = id => document.getElementById(id);
  const fmtMoney = n => Number(n||0).toLocaleString('tr-TR',{minimumFractionDigits:0,maximumFractionDigits:2});
  const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);

  function setSaveStatus(text, cls){
    const el = $('saveStatus');
    el.textContent = text;
    el.className = 'save-status'+(cls?(' '+cls):'');
  }

  const STORAGE_PREFIX = 'atolye-defteri:';

  async function storageGet(key){
    try{
      const raw = localStorage.getItem(STORAGE_PREFIX+key);
      return raw ? JSON.parse(raw) : [];
    }catch(e){
      return [];
    }
  }
  async function storageSet(key, value){
    try{
      localStorage.setItem(STORAGE_PREFIX+key, JSON.stringify(value));
      setSaveStatus('✓ Kaydedildi (bu tarayıcıda)', 'ok');
    }catch(e){
      setSaveStatus('✗ Kaydetme hatası — tarayıcı depolaması dolu/kapalı olabilir', 'err');
    }
  }

  async function loadAll(){
    setSaveStatus('Yükleniyor...');
    [suppliers, mechanics, jobs, stock] = await Promise.all([
      storageGet('suppliers'),
      storageGet('mechanics'),
      storageGet('jobs'),
      storageGet('stock')
    ]);
    setSaveStatus('✓ Veriler yüklendi', 'ok');
    renderAll();
  }

  function renderAll(){
    renderDashboard();
    renderSuppliers();
    renderMechanics();
    renderJobSelects();
    renderStockSelects();
    renderJobs();
    renderStock();
  }

  /* ---------- TABS ---------- */
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      $('panel-'+btn.dataset.tab).classList.add('active');
    });
  });

  /* ---------- DASHBOARD ---------- */
  function renderDashboard(){
    const totalJobs = jobs.length;
    const waitingJobs = jobs.filter(j=>j.status==='waiting').length;
    const doneJobs = jobs.filter(j=>j.status==='done');
    const totalProfit = doneJobs.reduce((s,j)=> s + (Number(j.price||0) - Number(j.cost||0)), 0);
    const lowStockCount = stock.filter(s=> Number(s.qty||0) <= Number(s.minQty||0)).length;

    const supCounts = {};
    jobs.forEach(j=>{ if(j.supplierId) supCounts[j.supplierId] = (supCounts[j.supplierId]||0)+1; });
    let topSupplierName = '—';
    let topCount = 0;
    Object.entries(supCounts).forEach(([id,count])=>{
      if(count>topCount){ topCount = count; const s = suppliers.find(x=>x.id===id); topSupplierName = s ? s.name : '—'; }
    });

    $('statGrid').innerHTML = `
      <div class="stat-card"><div class="stat-label">Toplam İş</div><div class="stat-value">${totalJobs}</div></div>
      <div class="stat-card"><div class="stat-label">Bekleyen İş</div><div class="stat-value">${waitingJobs}</div></div>
      <div class="stat-card"><div class="stat-label">Toplam Kâr</div><div class="stat-value money">${fmtMoney(totalProfit)}</div></div>
      <div class="stat-card${lowStockCount>0?' warn':''}"><div class="stat-label">Stokta Az Kalan</div><div class="stat-value${lowStockCount>0?' warn':''}">${lowStockCount}</div></div>
      <div class="stat-card"><div class="stat-label">En Aktif Tedarikçi</div><div class="stat-value" style="font-size:16px;">${topSupplierName}</div></div>
    `;

    const recent = [...jobs].sort((a,b)=> (b.date||'').localeCompare(a.date||'')).slice(0,5);
    if(recent.length===0){
      $('recentJobs').innerHTML = `<div class="empty">Henüz iş kaydı yok. "İşler" sekmesinden ilk kaydı ekleyin.</div>`;
    } else {
      $('recentJobs').innerHTML = recent.map(j=>{
        const mec = mechanics.find(m=>m.id===j.mechanicId);
        return `<div class="row-card">
          <div class="row-main">
            <div class="row-title">${escapeHtml(j.vehicle||'—')} <span class="tag">${mec?escapeHtml(mec.name):'Tamirci yok'}</span></div>
            <div class="row-sub"><span>Parça:</span> ${escapeHtml(j.parts||'—')} &nbsp;·&nbsp; <span>Tarih:</span> ${j.date||'—'}</div>
          </div>
          <div class="stamp ${j.status}">${j.status==='done'?'Teslim':'Beklemede'}</div>
        </div>`;
      }).join('');
    }
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  /* ---------- SUPPLIERS ---------- */
  function renderSuppliers(){
    if(suppliers.length===0){
      $('supplierList').innerHTML = `<div class="empty">Henüz tedarikçi eklenmedi.</div>`;
      return;
    }
    $('supplierList').innerHTML = suppliers.map(s=>`
      <div class="row-card">
        <div class="row-main">
          <div class="row-title">${escapeHtml(s.name)}</div>
          <div class="row-sub">
            <span>Tel:</span> ${escapeHtml(s.phone||'—')} &nbsp;·&nbsp;
            <span>Uzmanlık:</span> ${escapeHtml(s.spec||'—')} &nbsp;·&nbsp;
            <span>Teslim:</span> ${escapeHtml(s.time||'—')}
            ${s.note?`<br><span>Not:</span> ${escapeHtml(s.note)}`:''}
          </div>
        </div>
        <div class="row-actions">
          <button class="btn secondary small" onclick="AD_editSupplier('${s.id}')">Düzenle</button>
          <button class="btn danger small" onclick="AD_deleteSupplier('${s.id}')">Sil</button>
        </div>
      </div>
    `).join('');
  }

  $('supSubmitBtn').addEventListener('click', async ()=>{
    const name = $('supName').value.trim();
    if(!name){ $('supName').focus(); return; }
    const data = {
      id: editingSupId || uid(),
      name,
      phone: $('supPhone').value.trim(),
      spec: $('supSpec').value.trim(),
      time: $('supTime').value.trim(),
      note: $('supNote').value.trim()
    };
    if(editingSupId){
      suppliers = suppliers.map(s=> s.id===editingSupId ? data : s);
    } else {
      suppliers.push(data);
    }
    await storageSet('suppliers', suppliers);
    resetSupForm();
    renderSuppliers();
    renderJobSelects();
    renderStockSelects();
    renderDashboard();
  });

  $('supCancelBtn').addEventListener('click', resetSupForm);

  function resetSupForm(){
    editingSupId = null;
    ['supName','supPhone','supSpec','supTime','supNote'].forEach(id=> $(id).value='');
    $('supSubmitBtn').textContent = 'Tedarikçi Ekle';
    $('supCancelBtn').style.display = 'none';
  }

  window.AD_editSupplier = function(id){
    const s = suppliers.find(x=>x.id===id);
    if(!s) return;
    editingSupId = id;
    $('supName').value = s.name;
    $('supPhone').value = s.phone||'';
    $('supSpec').value = s.spec||'';
    $('supTime').value = s.time||'';
    $('supNote').value = s.note||'';
    $('supSubmitBtn').textContent = 'Değişikliği Kaydet';
    $('supCancelBtn').style.display = 'inline-block';
    document.querySelector('[data-tab="suppliers"]').click();
    $('supName').focus();
  };

  window.AD_deleteSupplier = async function(id){
    if(!confirm('Bu tedarikçiyi silmek istediğinize emin misiniz?')) return;
    suppliers = suppliers.filter(s=>s.id!==id);
    await storageSet('suppliers', suppliers);
    renderSuppliers();
    renderJobSelects();
    renderStockSelects();
    renderDashboard();
  };

  /* ---------- MECHANICS ---------- */
  function renderMechanics(){
    if(mechanics.length===0){
      $('mechanicList').innerHTML = `<div class="empty">Henüz tamirci eklenmedi.</div>`;
      return;
    }
    $('mechanicList').innerHTML = mechanics.map(m=>{
      const jobCount = jobs.filter(j=>j.mechanicId===m.id).length;
      return `<div class="row-card">
        <div class="row-main">
          <div class="row-title">${escapeHtml(m.name)} <span class="tag">${jobCount} iş</span></div>
          <div class="row-sub">
            <span>Dükkan:</span> ${escapeHtml(m.shop||'—')} &nbsp;·&nbsp;
            <span>Tel:</span> ${escapeHtml(m.phone||'—')}
            ${m.note?`<br><span>Not:</span> ${escapeHtml(m.note)}`:''}
          </div>
        </div>
        <div class="row-actions">
          <button class="btn secondary small" onclick="AD_editMechanic('${m.id}')">Düzenle</button>
          <button class="btn danger small" onclick="AD_deleteMechanic('${m.id}')">Sil</button>
        </div>
      </div>`;
    }).join('');
  }

  $('mecSubmitBtn').addEventListener('click', async ()=>{
    const name = $('mecName').value.trim();
    if(!name){ $('mecName').focus(); return; }
    const data = {
      id: editingMecId || uid(),
      name,
      shop: $('mecShop').value.trim(),
      phone: $('mecPhone').value.trim(),
      note: $('mecNote').value.trim()
    };
    if(editingMecId){
      mechanics = mechanics.map(m=> m.id===editingMecId ? data : m);
    } else {
      mechanics.push(data);
    }
    await storageSet('mechanics', mechanics);
    resetMecForm();
    renderMechanics();
    renderJobSelects();
    renderDashboard();
  });

  $('mecCancelBtn').addEventListener('click', resetMecForm);

  function resetMecForm(){
    editingMecId = null;
    ['mecName','mecShop','mecPhone','mecNote'].forEach(id=> $(id).value='');
    $('mecSubmitBtn').textContent = 'Tamirci Ekle';
    $('mecCancelBtn').style.display = 'none';
  }

  window.AD_editMechanic = function(id){
    const m = mechanics.find(x=>x.id===id);
    if(!m) return;
    editingMecId = id;
    $('mecName').value = m.name;
    $('mecShop').value = m.shop||'';
    $('mecPhone').value = m.phone||'';
    $('mecNote').value = m.note||'';
    $('mecSubmitBtn').textContent = 'Değişikliği Kaydet';
    $('mecCancelBtn').style.display = 'inline-block';
    document.querySelector('[data-tab="mechanics"]').click();
    $('mecName').focus();
  };

  window.AD_deleteMechanic = async function(id){
    if(!confirm('Bu tamirciyi silmek istediğinize emin misiniz?')) return;
    mechanics = mechanics.filter(m=>m.id!==id);
    await storageSet('mechanics', mechanics);
    renderMechanics();
    renderJobSelects();
    renderDashboard();
  };

  /* ---------- STOCK ---------- */
  function renderStockSelects(){
    const sel = $('stkSupplier');
    const cur = sel.value;
    sel.innerHTML = '<option value="">— Seç —</option>' + suppliers.map(s=>`<option value="${s.id}">${escapeHtml(s.name)}</option>`).join('');
    sel.value = cur;
  }

  function renderStock(){
    if(stock.length===0){
      $('stockList').innerHTML = `<div class="empty">Henüz stok kalemi eklenmedi.</div>`;
      return;
    }
    const sorted = [...stock].sort((a,b)=> (a.name||'').localeCompare(b.name||'', 'tr'));
    $('stockList').innerHTML = sorted.map(s=>{
      const qty = Number(s.qty||0);
      const minQty = Number(s.minQty||0);
      const low = qty <= minQty;
      const sup = suppliers.find(x=>x.id===s.supplierId);
      return `<div class="row-card${low?' low-stock':''}">
        <div class="row-main">
          <div class="row-title">${escapeHtml(s.name)} ${low?'<span class="tag danger">Az Stok</span>':''}</div>
          <div class="row-sub">
            <span>Parça No:</span> ${escapeHtml(s.partNo||'—')} &nbsp;·&nbsp;
            <span>Stok:</span> ${qty} adet (min. ${minQty}) &nbsp;·&nbsp;
            <span>Alış:</span> ₺${fmtMoney(s.buyPrice)} &nbsp;·&nbsp;
            <span>Satış:</span> ₺${fmtMoney(s.sellPrice)}
            ${sup?` &nbsp;·&nbsp; <span>Tedarikçi:</span> ${escapeHtml(sup.name)}`:''}
            ${s.note?`<br><span>Not:</span> ${escapeHtml(s.note)}`:''}
          </div>
        </div>
        <div class="row-actions">
          <button class="btn secondary small" onclick="AD_stockAdjust('${s.id}', -1)">−1</button>
          <button class="btn secondary small" onclick="AD_stockAdjust('${s.id}', 1)">+1</button>
          <button class="btn secondary small" onclick="AD_editStock('${s.id}')">Düzenle</button>
          <button class="btn danger small" onclick="AD_deleteStock('${s.id}')">Sil</button>
        </div>
      </div>`;
    }).join('');
  }

  $('stkSubmitBtn').addEventListener('click', async ()=>{
    const name = $('stkName').value.trim();
    if(!name){ $('stkName').focus(); return; }
    const data = {
      id: editingStkId || uid(),
      name,
      partNo: $('stkPartNo').value.trim(),
      qty: parseInt($('stkQty').value)||0,
      minQty: parseInt($('stkMinQty').value)||0,
      buyPrice: parseFloat($('stkBuyPrice').value)||0,
      sellPrice: parseFloat($('stkSellPrice').value)||0,
      supplierId: $('stkSupplier').value,
      note: $('stkNote').value.trim()
    };
    if(editingStkId){
      stock = stock.map(s=> s.id===editingStkId ? data : s);
    } else {
      stock.push(data);
    }
    await storageSet('stock', stock);
    resetStkForm();
    renderStock();
    renderDashboard();
  });

  $('stkCancelBtn').addEventListener('click', resetStkForm);

  function resetStkForm(){
    editingStkId = null;
    ['stkName','stkPartNo','stkQty','stkMinQty','stkBuyPrice','stkSellPrice','stkNote'].forEach(id=> $(id).value='');
    $('stkSupplier').value = '';
    $('stkSubmitBtn').textContent = 'Stok Ekle';
    $('stkCancelBtn').style.display = 'none';
  }

  window.AD_editStock = function(id){
    const s = stock.find(x=>x.id===id);
    if(!s) return;
    editingStkId = id;
    $('stkName').value = s.name;
    $('stkPartNo').value = s.partNo||'';
    $('stkQty').value = s.qty||0;
    $('stkMinQty').value = s.minQty||0;
    $('stkBuyPrice').value = s.buyPrice||'';
    $('stkSellPrice').value = s.sellPrice||'';
    $('stkSupplier').value = s.supplierId||'';
    $('stkNote').value = s.note||'';
    $('stkSubmitBtn').textContent = 'Değişikliği Kaydet';
    $('stkCancelBtn').style.display = 'inline-block';
    document.querySelector('[data-tab="stock"]').click();
    window.scrollTo({top:0, behavior:'smooth'});
  };

  window.AD_deleteStock = async function(id){
    if(!confirm('Bu stok kalemini silmek istediğinize emin misiniz?')) return;
    stock = stock.filter(s=>s.id!==id);
    await storageSet('stock', stock);
    renderStock();
    renderDashboard();
  };

  window.AD_stockAdjust = async function(id, delta){
    stock = stock.map(s=> s.id===id ? {...s, qty: Math.max(0, Number(s.qty||0)+delta)} : s);
    await storageSet('stock', stock);
    renderStock();
    renderDashboard();
  };

  /* ---------- JOBS ---------- */
  function renderJobSelects(){
    const mecSel = $('jobMechanic');
    const curMec = mecSel.value;
    mecSel.innerHTML = '<option value="">— Seç —</option>' + mechanics.map(m=>`<option value="${m.id}">${escapeHtml(m.name)}</option>`).join('');
    mecSel.value = curMec;

    const supSel = $('jobSupplier');
    const curSup = supSel.value;
    supSel.innerHTML = '<option value="">— Seç —</option>' + suppliers.map(s=>`<option value="${s.id}">${escapeHtml(s.name)}</option>`).join('');
    supSel.value = curSup;
  }

  function renderJobs(){
    if(jobs.length===0){
      $('jobList').innerHTML = `<div class="empty">Henüz iş kaydı yok. Yukarıdaki formdan ilk kaydı ekleyin.</div>`;
      return;
    }
    const sorted = [...jobs].sort((a,b)=> (b.date||'').localeCompare(a.date||''));
    $('jobList').innerHTML = sorted.map(j=>{
      const mec = mechanics.find(m=>m.id===j.mechanicId);
      const sup = suppliers.find(s=>s.id===j.supplierId);
      const profit = Number(j.price||0) - Number(j.cost||0);
      return `<div class="ticket">
        <div class="ticket-top">
          <div>
            <div class="ticket-veh">${escapeHtml(j.vehicle||'—')}</div>
            <div class="ticket-date">${j.date||'—'}</div>
          </div>
          <div class="stamp ${j.status}">${j.status==='done'?'Teslim Edildi':'Beklemede'}</div>
        </div>
        <div class="ticket-detail">
          <div><b>Parça:</b> ${escapeHtml(j.parts||'—')}</div>
          <div><b>Tamirci:</b> ${mec?escapeHtml(mec.name):'—'} &nbsp;&nbsp; <b>Tedarikçi:</b> ${sup?escapeHtml(sup.name):'—'}</div>
          ${j.note?`<div><b>Not:</b> ${escapeHtml(j.note)}</div>`:''}
        </div>
        <div class="ticket-money">
          <div class="money-block">Maliyet<span class="v">₺${fmtMoney(j.cost)}</span></div>
          <div class="money-block">Satış<span class="v">₺${fmtMoney(j.price)}</span></div>
          <div class="money-block profit">Kâr<span class="v">₺${fmtMoney(profit)}</span></div>
        </div>
        <div class="ticket-actions">
          <button class="btn secondary small" onclick="AD_toggleJobStatus('${j.id}')">${j.status==='done'?'Beklemede yap':'Teslim edildi işaretle'}</button>
          <button class="btn secondary small" onclick="AD_editJob('${j.id}')">Düzenle</button>
          <button class="btn danger small" onclick="AD_deleteJob('${j.id}')">Sil</button>
        </div>
      </div>`;
    }).join('');
  }

  $('jobSubmitBtn').addEventListener('click', async ()=>{
    const vehicle = $('jobVehicle').value.trim();
    if(!vehicle){ $('jobVehicle').focus(); return; }
    const data = {
      id: editingJobId || uid(),
      date: $('jobDate').value || new Date().toISOString().slice(0,10),
      mechanicId: $('jobMechanic').value,
      vehicle,
      parts: $('jobParts').value.trim(),
      supplierId: $('jobSupplier').value,
      status: $('jobStatus').value,
      cost: parseFloat($('jobCost').value)||0,
      price: parseFloat($('jobPrice').value)||0,
      note: $('jobNote').value.trim()
    };
    if(editingJobId){
      jobs = jobs.map(j=> j.id===editingJobId ? data : j);
    } else {
      jobs.push(data);
    }
    await storageSet('jobs', jobs);
    resetJobForm();
    renderJobs();
    renderDashboard();
    renderMechanics();
  });

  $('jobCancelBtn').addEventListener('click', resetJobForm);

  function resetJobForm(){
    editingJobId = null;
    ['jobVehicle','jobParts','jobCost','jobPrice','jobNote'].forEach(id=> $(id).value='');
    $('jobMechanic').value = '';
    $('jobSupplier').value = '';
    $('jobStatus').value = 'waiting';
    $('jobDate').value = new Date().toISOString().slice(0,10);
    $('jobSubmitBtn').textContent = 'Kaydı Ekle';
    $('jobCancelBtn').style.display = 'none';
  }

  window.AD_editJob = function(id){
    const j = jobs.find(x=>x.id===id);
    if(!j) return;
    editingJobId = id;
    $('jobDate').value = j.date||'';
    $('jobMechanic').value = j.mechanicId||'';
    $('jobVehicle').value = j.vehicle||'';
    $('jobParts').value = j.parts||'';
    $('jobSupplier').value = j.supplierId||'';
    $('jobStatus').value = j.status||'waiting';
    $('jobCost').value = j.cost||'';
    $('jobPrice').value = j.price||'';
    $('jobNote').value = j.note||'';
    $('jobSubmitBtn').textContent = 'Değişikliği Kaydet';
    $('jobCancelBtn').style.display = 'inline-block';
    document.querySelector('[data-tab="jobs"]').click();
    window.scrollTo({top:0, behavior:'smooth'});
  };

  window.AD_deleteJob = async function(id){
    if(!confirm('Bu iş kaydını silmek istediğinize emin misiniz?')) return;
    jobs = jobs.filter(j=>j.id!==id);
    await storageSet('jobs', jobs);
    renderJobs();
    renderDashboard();
    renderMechanics();
  };

  window.AD_toggleJobStatus = async function(id){
    jobs = jobs.map(j=> j.id===id ? {...j, status: j.status==='done'?'waiting':'done'} : j);
    await storageSet('jobs', jobs);
    renderJobs();
    renderDashboard();
  };

  /* ---------- RESET ---------- */
  $('resetBtn').addEventListener('click', async ()=>{
    if(!confirm('TÜM tedarikçi, tamirci, iş ve stok kayıtları silinecek. Emin misiniz?')) return;
    suppliers = []; mechanics = []; jobs = []; stock = [];
    await storageSet('suppliers', suppliers);
    await storageSet('mechanics', mechanics);
    await storageSet('jobs', jobs);
    await storageSet('stock', stock);
    renderAll();
  });

  /* ---------- INIT ---------- */
  $('jobDate').value = new Date().toISOString().slice(0,10);
  $('todayBadge').textContent = new Date().toLocaleDateString('tr-TR', {day:'2-digit',month:'long',year:'numeric'});
  loadAll();
})();
</script>
</body>
</html>
